<VirtualHost *:80>
    ServerName staging.mercury.cc.kyushu-u.ac.jp
    DocumentRoot /var/www/mercury-staging

    <Directory /var/www/mercury-staging>
        Options FollowSymLinks
        AllowOverride None
        Require all granted
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/mercury-staging-error.log
    CustomLog ${APACHE_LOG_DIR}/mercury-staging-access.log combined
</VirtualHost>
