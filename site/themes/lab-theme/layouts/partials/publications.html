<section class="section-block">
  <h2>最新論文 / Latest Publications</h2>

  <ul class="clean-list">
    {{ range first 3 (sort (where .Site.RegularPages "Section" "publications") "Date" "desc") }}
      <li>
        <strong><a href="{{ .RelPermalink }}">{{ .Title }}</a></strong><br>
        <span>{{ .Params.authors }}</span><br>
        <span>{{ with .Params.venue }}{{ . }}{{ else }}{{ .Params.journal }}{{ end }}</span>
      </li>
    {{ end }}
  </ul>
</section>
