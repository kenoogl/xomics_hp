name: site checks

on:
  pull_request:
  push:
    branches: [develop, main]

jobs:
  check:
    runs-on: ubuntu-latest
    env:
      HUGO_VERSION: "0.151.0"

    steps:
      - uses: actions/checkout@v6

      - name: Install Hugo
        run: |
          set -euo pipefail
          HUGO_DEB="hugo_extended_${HUGO_VERSION}_linux-amd64.deb"
          curl -fsSL -o "/tmp/${HUGO_DEB}" "https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/${HUGO_DEB}"
          sudo dpkg -i "/tmp/${HUGO_DEB}"
          hugo version

      - name: Validate content conventions
        run: python scripts/validate_content.py

      - name: Build site
        run: |
          cd site
          TZ=Asia/Tokyo hugo --destination ../public --cleanDestinationDir

      - name: Check markdown validity
        run: python scripts/check_markdown_validity.py --root .

      - name: Check broken internal links
        run: python scripts/check_internal_links.py --public-dir public

      - name: Check image size limit (500KB)
        run: |
          oversized=$(find site/static/images -type f -size +500k || true)
          if [ -n "$oversized" ]; then
            echo "Images over 500KB:" && echo "$oversized"
            exit 1
          fi
