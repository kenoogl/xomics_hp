<VirtualHost *:80>
    ServerName mercury.cc.kyushu-u.ac.jp
    DocumentRoot /var/www/clam

    <Directory /var/www/clam>
        Options FollowSymLinks
        AllowOverride None
        Require all granted
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/mercury-error.log
    CustomLog ${APACHE_LOG_DIR}/mercury-access.log combined
</VirtualHost>
