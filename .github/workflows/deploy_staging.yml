name: deploy staging

on:
  workflow_run:
    workflows: ["site checks"]
    types: [completed]

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'develop' }}
    runs-on: ubuntu-latest
    env:
      HUGO_VERSION: "0.151.0"

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Install Hugo
        run: |
          set -euo pipefail
          HUGO_DEB="hugo_extended_${HUGO_VERSION}_linux-amd64.deb"
          curl -fsSL -o "/tmp/${HUGO_DEB}" "https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/${HUGO_DEB}"
          sudo dpkg -i "/tmp/${HUGO_DEB}"
          hugo version

      - name: Build Hugo output
        run: |
          cd site
          TZ=Asia/Tokyo hugo --destination ../public --cleanDestinationDir

      - name: Install SSH key
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$DEPLOY_SSH_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: Deploy to staging
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          STAGING_TARGET_DIR: /var/www/mercury-staging
        run: ./scripts/deploy_staging.sh
