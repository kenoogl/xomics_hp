name: deploy production

on:
  workflow_run:
    workflows: ["site checks"]
    types: [completed]
  workflow_dispatch: {}

jobs:
  deploy:
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main') }}
    runs-on: ubuntu-latest
    env:
      HUGO_VERSION: "0.151.0"
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Install Hugo
        run: |
          set -euo pipefail
          HUGO_DEB="hugo_extended_${HUGO_VERSION}_linux-amd64.deb"
          curl -fsSL -o "/tmp/${HUGO_DEB}" "https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/${HUGO_DEB}"
          sudo dpkg -i "/tmp/${HUGO_DEB}"
          hugo version

      - name: Build Hugo output
        run: |
          cd site
          TZ=Asia/Tokyo hugo --destination ../public --cleanDestinationDir

      - name: Install SSH key
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$DEPLOY_SSH_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: Deploy to production
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          PRODUCTION_TARGET_DIR: /var/www/clam
        run: ./scripts/deploy_production.sh
